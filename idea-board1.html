<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDEA BOARD</title>

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            max-width: 900px;
            width: 100%;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        /* Header styles */
        .header {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            padding: 30px 40px;
            text-align: center;
            position: relative;
        }

        .header .logo {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 2.5em;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
        }

        .idea-counter {
            font-size: 1.2em;
            opacity: 0.9;
        }

        /* Main content */
        .main-content {
            padding: 40px;
        }

        /* Table styles */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 40px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        th, td {
            padding: 15px 20px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }

        th {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tbody tr:nth-child(even) {
            background-color: #f9fafb;
        }

        tbody tr:hover {
            background-color: #f3f4f6;
            transition: background-color 0.2s ease;
        }

        /* Integrated Idea Cell Content */
        .idea-cell-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .idea-text {
            flex: 1;
        }

        .rating-container {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .stars {
            display: flex;
            gap: 3px;
            font-size: 20px;
            cursor: pointer;
        }

        .star {
            color: #d1d5db;
            transition: all 0.2s ease;
            user-select: none;
        }

        .star:hover,
        .star.active {
            color: #fbbf24;
            transform: scale(1.2);
        }

        .rating-score {
            font-size: 14px;
            color: #6b7280;
            font-weight: 600;
            min-width: 35px;
            text-align: right;
        }

        .delete-btn {
            background: transparent;
            color: #dc2626;
            padding: 8px;
            font-size: 18px;
            box-shadow: none;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        .delete-btn:hover {
            background: rgba(220, 38, 38, 0.1);
            transform: scale(1.15);
            box-shadow: none;
        }

        /* Add Idea section */
        .add-idea {
            margin-top: 40px;
            padding: 30px;
            background-color: #f8fafc;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
        }

        .add-idea h2 {
            color: #1e3a8a;
            margin-bottom: 25px;
            font-size: 1.5em;
            font-weight: 600;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            border: 2px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: flex-start;
        }

        button {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(30, 58, 138, 0.3);
        }

        button:hover {
            background: linear-gradient(135deg, #1e40af 0%, #2563eb 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(30, 58, 138, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .clear-btn {
            background: linear-gradient(135deg, #dc2626 0%, #ef4444 100%);
        }

        .clear-btn:hover {
            background: linear-gradient(135deg, #b91c1c 0%, #dc2626 100%);
        }

        /* Footer styles */
        .footer {
            background-color: #f8fafc;
            padding: 20px 40px;
            text-align: center;
            border-top: 1px solid #e2e8f0;
            color: #6b7280;
            font-size: 0.9em;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .container {
                margin: 10px;
            }

            .header {
                padding: 20px;
            }

            .header h1 {
                font-size: 2em;
            }

            .main-content {
                padding: 20px;
            }

            th, td {
                padding: 10px;
                font-size: 14px;
            }

            .add-idea {
                padding: 20px;
            }

            .button-group {
                flex-direction: column;
            }

            .footer {
                padding: 15px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">💡</div>
            <h1>IDEA BOARD</h1>
            <div class="idea-counter">Total Ideas: <span id="ideaCount">0</span></div>
        </header>
        <main class="main-content">
            <table id="ideasTable">
                <thead>
                    <tr>
                        <th style="width: 20%;">Name</th>
                        <th>Idea</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Ideas will be dynamically added here -->
                </tbody>
            </table>
            <div class="add-idea">
                <h2>Add Your Idea</h2>
                <input type="text" id="nameInput" placeholder="Your Name" required>
                <textarea id="ideaInput" placeholder="Describe your idea..." rows="4" required></textarea>
                <div class="button-group">
                    <button onclick="addIdea()">Add Idea</button>
                    <button class="clear-btn" onclick="clearInputs()">Clear</button>
                </div>
            </div>
        </main>
        <footer class="footer">
            <p>&copy; 2026 Group Idea Board. Share your brilliant ideas!</p>
        </footer>
    </div>

    <script>
        let ideaCount = 0;

        // Function to update the idea counter
        function updateCounter() {
            document.getElementById('ideaCount').textContent = ideaCount;
        }

        // Function to add a new idea to the table
        function addIdea() {
            // Get input values and trim whitespace
            const name = document.getElementById('nameInput').value.trim();
            const idea = document.getElementById('ideaInput').value.trim();

            // Validate inputs
            if (name === '' || idea === '') {
                alert('Please fill in both your name and idea.');
                return;
            }

            // Get table body and create new row
            const tableBody = document.querySelector('#ideasTable tbody');
            const newRow = tableBody.insertRow();

            // Create Name cell
            const nameCell = newRow.insertCell(0);
            nameCell.textContent = name;

            // Create Idea cell with integrated content
            const ideaCell = newRow.insertCell(1);
            
            // Container for all content
            const contentDiv = document.createElement('div');
            contentDiv.className = 'idea-cell-content';
            
            const textSpan = document.createElement('span');
            textSpan.className = 'idea-text';
            textSpan.textContent = idea;
            
            // Rating container
            const ratingContainer = document.createElement('div');
            ratingContainer.className = 'rating-container';
            
            // Stars
            const starsDiv = document.createElement('div');
            starsDiv.className = 'stars';
            
            for (let i = 1; i <= 5; i++) {
                const star = document.createElement('span');
                star.className = 'star';
                star.textContent = '★';
                star.dataset.rating = i;
                star.onclick = function(e) {
                    e.stopPropagation();
                    rateIdea(star, starsDiv, ratingScore);
                };
                starsDiv.appendChild(star);
            }
            
            // Rating score display
            const ratingScore = document.createElement('div');
            ratingScore.className = 'rating-score';
            ratingScore.textContent = '0/5';
            
            // Delete button
            const deleteBtn = document.createElement('button');
            deleteBtn.innerHTML = '🗑️';
            deleteBtn.className = 'delete-btn';
            deleteBtn.title = 'Delete Idea';
            deleteBtn.onclick = function(e) {
                e.stopPropagation();
                deleteIdea(newRow);
            };
            
            ratingContainer.appendChild(starsDiv);
            ratingContainer.appendChild(ratingScore);
            contentDiv.appendChild(textSpan);
            contentDiv.appendChild(ratingContainer);
            contentDiv.appendChild(deleteBtn);
            ideaCell.appendChild(contentDiv);

            // Increment counter and update display
            ideaCount++;
            updateCounter();

            // Clear input fields
            clearInputs();

            // Optional: Scroll to the new idea
            newRow.scrollIntoView({ behavior: 'smooth' });
        }

        // Function to rate an idea
        function rateIdea(star, starsDiv, scoreDisplay) {
            const rating = star.dataset.rating;
            
            // Update all stars
            const allStars = starsDiv.querySelectorAll('.star');
            allStars.forEach(s => {
                if (s.dataset.rating <= rating) {
                    s.classList.add('active');
                } else {
                    s.classList.remove('active');
                }
            });
            
            // Update score display
            scoreDisplay.textContent = rating + '/5';
        }

        // Function to delete an idea
        function deleteIdea(row) {
            if (confirm('Are you sure you want to delete this idea?')) {
                row.remove();
                ideaCount--;
                updateCounter();
            }
        }

        // Function to clear input fields
        function clearInputs() {
            document.getElementById('nameInput').value = '';
            document.getElementById('ideaInput').value = '';
        }

        // Allow adding idea with Enter key in textarea
        document.getElementById('ideaInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                addIdea();
            }
        });
    </script>
</body>
</html>
